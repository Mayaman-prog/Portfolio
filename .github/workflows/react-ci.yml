name: React CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build React Project
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v2

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      # Step 3: Navigate to the 'frontend' directory and install dependencies
      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      # Step 4: Lint Code (in the 'frontend' directory)
      - name: Lint Code
        run: |
          cd frontend
          npm run lint

      # Step 5: Build Project (in the 'frontend' directory)
      - name: Build Project
        run: |
          cd frontend
          npm run build

      # Step 6: Deploy to Vercel (in the 'frontend' directory)
      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}